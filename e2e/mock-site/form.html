<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cohand Test - Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #f9fafb; color: #111827; }
    nav { margin-bottom: 2rem; }
    nav a { margin-right: 1rem; color: #2563eb; text-decoration: underline; }
    form { max-width: 24rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    input, textarea { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 1rem; }
    textarea { min-height: 6rem; resize: vertical; }
    button[type="submit"] { padding: 0.5rem 1.5rem; background: #059669; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 1rem; }
    #form-result { margin-top: 1rem; padding: 1rem; background: #d1fae5; border-radius: 0.375rem; display: none; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/form.html">Form</a>
    <a href="/dynamic.html">Dynamic</a>
    <a href="/login.html">Login</a>
  </nav>

  <h1 style="margin-bottom: 1rem;">Contact Form</h1>

  <form id="contact-form">
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Your message..." required></textarea>
    </div>
    <button type="submit">Send Message</button>
  </form>

  <div id="form-result"></div>

  <script>
    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const data = new FormData(e.target);
      const result = document.getElementById('form-result');
      result.textContent = `Thank you, ${data.get('name')}! Your message has been sent.`;
      result.style.display = 'block';
    });
  </script>
</body>
</html>
