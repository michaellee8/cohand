<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cohand Test - Dynamic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #f9fafb; color: #111827; }
    nav { margin-bottom: 2rem; }
    nav a { margin-right: 1rem; color: #2563eb; text-decoration: underline; }
    .loading { color: #6b7280; font-style: italic; }
    .loaded-content { padding: 1rem; background: #dbeafe; border-radius: 0.375rem; margin-top: 1rem; }
    #status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.875rem; font-weight: 600; }
    .status-loading { background: #fef3c7; color: #92400e; }
    .status-ready { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/form.html">Form</a>
    <a href="/dynamic.html">Dynamic</a>
    <a href="/login.html">Login</a>
  </nav>

  <h1 style="margin-bottom: 1rem;">Dynamic Content Page</h1>

  <p>Status: <span id="status-badge" class="status-loading">Loading...</span></p>

  <div id="dynamic-container">
    <p class="loading" id="loading-text">Content is loading, please wait...</p>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById('loading-text').remove();
      document.getElementById('status-badge').textContent = 'Ready';
      document.getElementById('status-badge').className = 'status-ready';

      const container = document.getElementById('dynamic-container');
      const content = document.createElement('div');
      content.className = 'loaded-content';
      content.id = 'dynamic-content';
      content.setAttribute('data-testid', 'dynamic-content');
      content.innerHTML = `
        <h2>Data Loaded Successfully</h2>
        <ul>
          <li>Record A — Active</li>
          <li>Record B — Pending</li>
          <li>Record C — Completed</li>
        </ul>
      `;
      container.appendChild(content);
    }, 2000);
  </script>
</body>
</html>
